<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>SaaS vs DaaS vs AI Leaders – Revenue per Employee Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #01696f 0%, #0f172a 100%);
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #01696f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
        }
        
        .header .subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        
        .back-link {
            color: #10b981;
            text-decoration: none;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-link:hover {
            color: #34d399;
        }
        
        .content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .pdf-container {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        
        .pdf-viewer {
            width: 100%;
            height: calc(100vh - 200px);
            min-height: 600px;
            border: none;
        }
        
        .download-bar {
            background: #1e293b;
            padding: 1rem 1.5rem;
            border-top: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .download-btn {
            background: #01696f;
            color: white;
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }
        
        .download-btn:hover {
            background: #047a81;
        }
        
        .meta {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.125rem;
            }
            
            .content {
                padding: 1rem;
            }
            
            .pdf-viewer {
                height: calc(100vh - 180px);
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>SaaS vs DaaS vs AI Leaders</h1>
            <div class="subtitle">Revenue per Employee Analysis</div>
        </div>
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
    
    <div class="content">
        <div class="pdf-container">
            <iframe src="report.pdf" class="pdf-viewer" type="application/pdf"></iframe>
            <div class="download-bar">
                <span class="meta">PDF Report • Generated by Perplexity</span>
                <a href="report.pdf" download class="download-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download PDF
                </a>
            </div>
        </div>
    </div>
</body>
</html>
