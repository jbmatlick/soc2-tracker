<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ChatB2B Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f7f6f2; color: #1a1a1a; min-height: 100vh; padding-top: 48px; }
    .container { max-width: 700px; margin: 80px auto; padding: 0 24px; text-align: center; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 48px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card {
      background: #fff; border: 1px solid #e5e5e5; border-top: 4px solid #01696f;
      padding: 32px 24px; text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .card-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #01696f; margin-bottom: 8px; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: #666; line-height: 1.5; }
    @media (max-width: 500px) { .cards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>ChatB2B Admin Console</h1>
    <p class="subtitle">Internal tools and dashboards</p>
    <div class="cards">
      <a href="/soc2/" class="card">
        <div class="card-label">Compliance</div>
        <div class="card-title">SOC 2 Tracker</div>
        <div class="card-desc">Track SOC 2 Type 1 controls, evidence collection, and audit readiness.</div>
      </a>
      <a href="/icp/" class="card">
        <div class="card-label">GTM</div>
        <div class="card-title">Account Universe</div>
        <div class="card-desc">ICP definition, displacement matrix, dream accounts, and outreach playbook.</div>
      </a>
    </div>
  </div>
  <script src="/nav.js"></script>
</body>
</html>
